{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ldap-secret
  namespace: openshift-config
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: {{ .Values.externalSecrets.cluster_secret_store }}
    kind: ClusterSecretStore
  target:
    name: ldap-secret
    template:
      engineVersion: v2
      data:
        bindPassword: >-
          {{ printf "{{ .bindPassword }}" }}
  data:
    - secretKey: bindPassword
      remoteRef:
        key: {{ include "generic-clusterconfig.SecretKey" . | trim }}
        property: bindPassword
{{- end }}
