{{- if .Values.ldapGroupSync.enabled }}
{{/* Cluster Admin Groups */}}
{{- range $group := .Values.ldapGroupSync.rbac.groupRoleMappings.clusterAdminGroups }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "generic-clusterconfig.ldapGroupSync.crbName" (dict "group" $group "role" "cluster-admin") }}
  labels:
    {{- include "generic-clusterconfig.labels" $ | nindent 4 }}
    app.kubernetes.io/component: ldap-group-sync
    rbac.openshift.io/group: {{ $group | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ $group }}
{{- end }}
{{- end }}
