{{- if .Values.ldapGroupSync.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.ldapGroupSync.rbac.clusterRoleBindingName }}
  labels:
    {{- include "generic-clusterconfig.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.ldapGroupSync.rbac.clusterRoleName }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.ldapGroupSync.rbac.serviceAccountName }}
  namespace: {{ include "generic-clusterconfig.ldapGroupSync.namespace" . }}
{{- end }}
