{{- if .Values.ldapGroupSync.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.ldapGroupSync.rbac.clusterRoleName }}
  labels:
    {{- include "generic-clusterconfig.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  - user.openshift.io
  resources:
  - groups
  verbs:
  - get
  - list
  - create
  - update
{{- end }}
