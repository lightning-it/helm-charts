{{- if .Values.ldapGroupSync.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ldap-sync-config
  namespace: {{ include "generic-clusterconfig.ldapGroupSync.namespace" . }}
  labels:
    {{- include "generic-clusterconfig.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  sync-config.yaml: |
{{ include "generic-clusterconfig.ldapGroupSync.config" . | indent 4 }}
{{- end }}
