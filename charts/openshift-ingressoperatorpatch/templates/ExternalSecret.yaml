{{- include "openshift-ingressoperatorpatch.validateCertificateSource" . -}}
{{- if eq .Values.certificateSource "external-secrets" }}
{{- if .Values.ingress.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.ingress.certificateSecret }}
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.ingress.certificateSecret }}
    template:
      type: kubernetes.io/tls
  data:
{{ include "openshift-ingressoperatorpatch.eso.dataEntries" .Values.externalSecrets.ingress.data | indent 4 }}
{{- end }}
{{- if .Values.api.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.api.certificateSecret }}
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.api.certificateSecret }}
    template:
      type: kubernetes.io/tls
  data:
{{ include "openshift-ingressoperatorpatch.eso.dataEntries" .Values.externalSecrets.api.data | indent 4 }}
{{- end }}
{{- end }}
