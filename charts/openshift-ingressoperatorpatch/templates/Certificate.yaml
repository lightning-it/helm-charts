{{- include "openshift-ingressoperatorpatch.validateCertificateSource" . -}}
{{- if eq .Values.certificateSource "cert-manager" }}
{{- if .Values.default_ingress_dns_names }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.default_ingress_certificate_secret }}
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  secretName: {{ .Values.default_ingress_certificate_secret }}
  commonName: {{ index .Values.default_ingress_dns_names 0 }}
  dnsNames: {{ .Values.default_ingress_dns_names | toYaml | nindent 4 }}
  issuerRef:
    name: {{ .Values.certManager.issuerRef }}
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 256
{{- end }}
{{- if .Values.default_api_dns_names }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.default_api_certificate_secret }}
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  secretName: {{ .Values.default_api_certificate_secret }}
  commonName: {{ index .Values.default_api_dns_names 0 }}
  dnsNames: {{ .Values.default_api_dns_names | toYaml | nindent 4 }}
  issuerRef:
    name: {{ .Values.certManager.issuerRef }}
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 256
{{- end }}
{{- end }}
