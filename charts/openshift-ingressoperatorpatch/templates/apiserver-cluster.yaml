{{- if .Values.default_api_dns_names }}
---
apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  servingCerts:
    namedCertificates:
      - names: {{ .Values.default_api_dns_names | toYaml | nindent 8 }}
        servingCertificate:
          name: {{ .Values.default_api_certificate_secret }}
{{- end }}
