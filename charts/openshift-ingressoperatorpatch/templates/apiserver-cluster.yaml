{{- if .Values.api.enabled }}
---
apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  servingCerts:
    namedCertificates:
      - names: {{ .Values.api.dnsNames | toYaml | nindent 8 }}
        servingCertificate:
          name: {{ .Values.api.certificateSecret }}
{{- end }}
