---
namespace:
  name: openshift-local-storage

nodeSelectorTerms:
  - matchExpressions:
      - key: "cluster.ocs.openshift.io/openshift-storage"
        operator: "Exists"

tolerations:
  - effect: "NoSchedule"
    key: "node.ocs.openshift.io/storage"
    operator: "Equal"
    value: "true"
  - effect: "NoSchedule"
    key: "node-role.kubernetes.io/infra"
    value: "reserved"
  - effect: "NoExecute"
    key: "node-role.kubernetes.io/infra"
    value: "reserved"


